<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Furina Monitora v25.0.2</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>

<header>
    <h1>🌊 Furina Monitora</h1>
</header>

<div class="container">

    <div class="chat-box">

        <select id="guildSelect">
            <option>Carregando servidores...</option>
        </select>

        <select id="channelSelect">
            <option>Selecione um canal</option>
        </select>

        <button id="definirCanalBtn">
            Definir Canal
        </button>

        <div id="messages"></div>

        <div class="input-area">

            <input
                id="mensagemInput"
                placeholder="Digite uma mensagem">

            <button id="enviarBtn">
                Enviar
            </button>

        </div>

    </div>

    <div class="status-box">

        <h2>Monitoramento</h2>

        <div id="status"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
